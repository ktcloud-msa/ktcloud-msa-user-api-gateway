syntax = "proto3";

option java_multiple_files = true;
option java_package = "dev.ktcloud.black.product.service.adapter.presentation.web.inbound.grpc";

package product.service;

service ProductService {
  rpc CreateProduct (CreateProductRequest) returns (ProductResponseDto);
  rpc FetchProduct (FetchProductRequest) returns (ProductResponseDto);
  rpc FetchAll (Empty) returns (FetchAllProductsResponse);
}

message ProductResponseDto {
  string id = 1;
  string name = 2;
  string description = 3;
  int32 price = 4;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  int32 price = 3;
}

message FetchProductRequest {
  string id = 1;
}

message Empty {}

message FetchAllProductsResponse {
  repeated ProductResponseDto products = 1;
}

