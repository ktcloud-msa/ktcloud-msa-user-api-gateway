spring:
  application:
    name: user-api-gateway

grpc:
  client:
    product-service:
      address: 'static://localhost:9001'
      negotiation-type: plaintext
    order-service:
      address: 'static://localhost:9002'
      negotiation-type: plaintext
    inventory-service:
      address: 'static://localhost:9003'
      negotiation-type: plaintext
    auth-service:
      address: 'static://localhost:9005'
      negotiation-type: plaintext

server:
  port: 8100

management:
  endpoints:
    web:
      base-path: /
      path-mapping:
        health: healthz
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    groups-order: DESC
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs