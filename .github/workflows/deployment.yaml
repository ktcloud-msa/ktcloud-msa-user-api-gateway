name: CI Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout Manifest Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          file: ./Containerfile
          push: false
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ktcloud-msa-user-api-gateway:${{ github.sha }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/ktcloud-msa-user-api-gateway:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      
      - name: Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ktcloud-msa-user-api-gateway:${{ github.sha }}

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: 'ktcloud-msa/ktcloud-msa-values'
          token: ${{ secrets.GH_PAT }}

      - name: Update Image Tag
        run: |
          cd ktcloud-msa-user-api-gateway
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" values-release.yaml

      - name: Commit and Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Update image tag to ${{ github.sha }}"
          git push origin master